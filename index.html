<script type="module">
// ===== FIREBASE CONFIGURATION =====
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB9pDqpoc0hvpQ7SEMoF7P8dx2agGYYCHY",
  authDomain: "tortilleria-29c18.firebaseapp.com",
  projectId: "tortilleria-29c18",
  storageBucket: "tortilleria-29c18.firebasestorage.app",
  messagingSenderId: "767059338986",
  appId: "1:767059338986:web:d7da947cea0e6dc7b39993",
  measurementId: "G-TPFVZN1KWN"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ===== STATE =====
let selectedCalDate = null; 
let currentUser = null;
let currentSection = 'dashboard';
let allRecords = [];
let recordCount = 0;
let calendarDate = new Date(); 
let dashboardChartRange = 'week'; // Controla si la gráfica muestra 'week' (semana) o 'month' (meses)

const systemCollections = ['client', 'payment', 'user', 'checkin', 'product', 'sale', 'log'];

systemCollections.forEach(type => {
  const collectionName = type + 's';
  onSnapshot(collection(db, collectionName), (snapshot) => {
    allRecords = allRecords.filter(r => r.type !== type);
    snapshot.forEach(docSnap => {
      allRecords.push({ ...docSnap.data(), __backendId: docSnap.id, type: type });
    });
    recordCount = allRecords.length;
    // Si estamos viendo un ticket, EVITAMOS que se redibuje la pantalla
    if(currentUser && currentSection !== 'ticket') {
        renderCurrentSection();
    }
  });
});

window.dataSdk = {
  create: async (data) => {
    try {
      const colName = data.type + 's';
      data.timestamp = Date.now(); // <-- MAGIA: Reloj exacto para ordenar historiales
      const docRef = await addDoc(collection(db, colName), data);
      return { isOk: true, id: docRef.id };
    } catch (e) { console.error("Firebase Create Error:", e); return { isOk: false }; }
  },
  update: async (data) => {
    try {
      const colName = data.type + 's';
      const docRef = doc(db, colName, data.__backendId);
      const updateData = { ...data };
      delete updateData.__backendId; 
      await updateDoc(docRef, updateData);
      return { isOk: true };
    } catch (e) { console.error("Firebase Update Error:", e); return { isOk: false }; }
  },
  delete: async (data) => {
    try {
      const colName = data.type + 's';
      await deleteDoc(doc(db, colName, data.__backendId));
      return { isOk: true };
    } catch (e) { console.error("Firebase Delete Error:", e); return { isOk: false }; }
  }
};

const defaultConfig = {
  gym_name: 'GymPro Manager',
  gym_slogan: 'Control de Ventas y Accesos',
  background_color: '#0a0a0f',
  surface_color: '#14141f',
  text_color: '#e2e8f0',
  accent_color: '#f43f5e',
  muted_color: '#64748b',
  font_family: 'Outfit',
  font_size: 14
};

// ===== ELEMENT SDK =====
if(window.elementSdk) {
  window.elementSdk.init({
    defaultConfig,
    onConfigChange: async (config) => {
      const gn = config.gym_name || defaultConfig.gym_name;
      const gs = config.gym_slogan || defaultConfig.gym_slogan;
      const ff = config.font_family || defaultConfig.font_family;
      const fs = config.font_size || defaultConfig.font_size;
      const bg = config.background_color || defaultConfig.background_color;
      const sf = config.surface_color || defaultConfig.surface_color;
      const tc = config.text_color || defaultConfig.text_color;
      const ac = config.accent_color || defaultConfig.accent_color;
      const mc = config.muted_color || defaultConfig.muted_color;

      document.body.style.fontFamily = `${ff}, Outfit, sans-serif`;
      document.body.style.fontSize = `${fs}px`;
      document.body.style.backgroundColor = bg;
      document.body.style.color = tc;

      document.querySelectorAll('.bg-gym-surface, header, aside').forEach(el => el.style.backgroundColor = sf);
      document.querySelectorAll('.text-gym-accent, .nav-item.active').forEach(el => el.style.color = ac);
      document.querySelectorAll('.text-gym-muted').forEach(el => el.style.color = mc);

      const nameEls = ['login-gym-name','header-gym-name','sidebar-gym-name'];
      nameEls.forEach(id => { const el = document.getElementById(id); if(el) el.textContent = gn; });
      const sloganEl = document.getElementById('login-gym-slogan');
      if(sloganEl) sloganEl.textContent = gs;
    }
  });
}

// ===== HELPERS =====
function getRecords(type) { 
  // OBLIGAMOS A ORDENAR POR TIMESTAMP DE CREACIÓN PARA QUE NADA SE PIERDA
  return allRecords.filter(r => r.type === type).sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0)); 
}
function today() { return new Date().toISOString().split('T')[0]; }
function formatDate(d) { if(!d) return '-'; try { return new Date(d + 'T12:00:00').toLocaleDateString('es-MX',{day:'2-digit',month:'short',year:'numeric'}); } catch { return d; }}
function formatMoney(n) { return '$' + Number(n||0).toLocaleString('es-MX',{minimumFractionDigits:0}); }

function toast(msg, type='success') {
  const c = document.getElementById('toast-container');
  const t = document.createElement('div');
  t.className = `toast ${type==='error'?'bg-gym-danger':'bg-gym-success'}`;
  t.style.background = type==='error'?'#ef4444':'#10b981';
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(() => { t.style.opacity='0'; t.style.transition='opacity 0.3s'; setTimeout(()=>t.remove(),300); }, 2500);
}

// ===== AUTHENTICATION =====
function doLogin() {
  const user = document.getElementById('login-user').value.trim();
  const pass = document.getElementById('login-pass').value.trim();
  const errorEl = document.getElementById('login-error');

  if(!user || !pass) { errorEl.textContent = 'Ingresa usuario y contraseña'; errorEl.classList.remove('hidden'); return; }

  if (user === 'admin' && pass === 'admin') {
    currentUser = { name: 'Admin Master', role: 'admin', username: 'admin' };
  } else {
    const dbUser = allRecords.find(r => r.type === 'user' && r.username === user && r.password === pass);
    if (dbUser) { currentUser = { name: dbUser.name, role: dbUser.role === 'Administrador' ? 'admin' : 'employee', username: dbUser.username }; } 
    else { errorEl.textContent = 'Credenciales incorrectas'; errorEl.classList.remove('hidden'); return; }
  }

  errorEl.classList.add('hidden');
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('main-app').classList.remove('hidden');
  document.getElementById('user-name').textContent = currentUser.name;
  document.getElementById('user-role').textContent = currentUser.role === 'admin' ? 'Administrador' : 'Mostrador';
  
  buildNav();
  navigateTo('dashboard');
  
  window.dataSdk.create({ type:'log', name:currentUser.name, role:(currentUser.role==='admin'?'Admin':'Mostrador'), date:new Date().toISOString(), category:'login', status:'active', phone:'', email:'', membership:'', amount:0, method:'', expiry:'', schedule:'', checkin_date:'', notes:'' });
  if(window.lucide) lucide.createIcons();
}

function doLogout() {
  currentUser = null;
  document.getElementById('main-app').classList.add('hidden');
  document.getElementById('login-screen').classList.remove('hidden');
  document.getElementById('login-user').value = '';
  document.getElementById('login-pass').value = '';
}

document.getElementById('login-pass').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });

// ===== NAVIGATION =====
function buildNav() {
  const adminNav = [
    {id:'dashboard',icon:'layout-dashboard',label:'Dashboard'},
    {id:'pos',icon:'shopping-cart',label:'Punto de Venta'},
    {id:'clients',icon:'users',label:'Clientes'},
    {id:'payments',icon:'calendar-check',label:'Mensualidades'},
    {id:'payment-history',icon:'clipboard-list',label:'Historial Cobros'}, // <--- NUEVO MÓDULO
    {id:'products',icon:'package',label:'Productos'},
    {id:'checkin',icon:'scan-line',label:'Check-in'},
    {id:'sales-history',icon:'history',label:'Historial Ventas POS'},
    {id:'finance',icon:'bar-chart-3',label:'Finanzas'},
    {id:'users',icon:'users-cog',label:'Usuarios'},
    {id:'access-log',icon:'shield',label:'Bitácora'}
  ];
  const empNav = [
    {id:'dashboard',icon:'layout-dashboard',label:'Dashboard'},
    {id:'pos',icon:'shopping-cart',label:'Punto de Venta'},
    {id:'clients',icon:'users',label:'Clientes'},
    {id:'payments',icon:'calendar-check',label:'Mensualidades'},
    {id:'payment-history',icon:'clipboard-list',label:'Historial Cobros'}, // <--- NUEVO MÓDULO
    {id:'checkin',icon:'scan-line',label:'Check-in'},
    {id:'sales-history',icon:'history',label:'Historial Ventas POS'}
  ];
  const items = currentUser.role==='admin' ? adminNav : empNav;
  const html = items.map(i => `<button class="nav-item w-full flex items-center gap-2.5 px-4 py-2.5 text-xs font-500 text-gym-muted ${currentSection===i.id?'active':''}" onclick="navigateTo('${i.id}')"><i data-lucide="${i.icon}" class="w-4 h-4"></i>${i.label}</button>`).join('');
  document.getElementById('sidebar-nav').innerHTML = html;
  document.getElementById('sidebar-nav-mobile').innerHTML = html;
  if(window.lucide) lucide.createIcons();
}

function toggleSidebar() {
  document.getElementById('sidebar-overlay').classList.toggle('hidden');
  document.getElementById('sidebar-mobile').classList.toggle('hidden');
}

function navigateTo(section) {
  currentSection = section;
  buildNav();
  renderCurrentSection();
  document.getElementById('sidebar-overlay').classList.add('hidden');
  document.getElementById('sidebar-mobile').classList.add('hidden');
}

function renderCurrentSection() {
  const c = document.getElementById('content');
  const map = { 
    dashboard: renderDashboard, 
    clients: renderClients, 
    payments: renderPayments, 
    'payment-history': renderPaymentHistory, // <--- NUEVA VISTA
    checkin: renderCheckin, 
    finance: renderFinance, 
    products: renderProducts, 
    'access-log': renderAccessLog, 
    pos: renderPOS, 
    'sales-history': renderSalesHistory, 
    users: renderUsers 
  };
  const fn = map[currentSection];
  if(fn) { c.innerHTML = fn(); if(window.lucide) lucide.createIcons(); }
}

// ===== DASHBOARD =====
// ===== DASHBOARD MEJORADO (CON RADAR DE COBROS WA) =====
function renderDashboard() {
  const clients = getRecords('client');
  const payments = getRecords('payment');
  const sales = getRecords('sale');

  const active = clients.filter(c=>c.status==='active').length;
  
  const todayDate = new Date();
  todayDate.setHours(0,0,0,0);
  const todayStr = today();

  const todayPayments = payments.filter(p=>p.date===todayStr);
  const todayPaymentsIncome = todayPayments.reduce((s,p)=>s+(Number(p.amount)||0),0);
  const monthPayments = payments.filter(p=>p.date&&p.date.startsWith(new Date().toISOString().slice(0,7)));
  const monthPaymentsIncome = monthPayments.reduce((s,p)=>s+(Number(p.amount)||0),0);

  const todaySales = sales.filter(s=>s.date===todayStr);
  const todaySalesIncome = todaySales.reduce((s,p)=>s+(Number(p.amount)||0),0);
  const monthSales = sales.filter(p=>p.date&&p.date.startsWith(new Date().toISOString().slice(0,7)));
  const monthSalesIncome = monthSales.reduce((s,p)=>s+(Number(p.amount)||0),0);

  const todayIncome = todayPaymentsIncome + todaySalesIncome;
  const monthIncome = monthPaymentsIncome + monthSalesIncome;

  const expiring = clients.filter(c => { if(!c.expiry) return false; const d=new Date(c.expiry + 'T12:00:00'); const diff=(d-todayDate)/(1000*60*60*24); return diff>=0&&diff<=7; }).length;
  const checkins = getRecords('checkin').filter(c=>c.date===todayStr).length;

  window.dashboardChartRange = window.dashboardChartRange || 'week';

  let chartLabels = [];
  let chartData = [];

  if (window.dashboardChartRange === 'week') {
    for(let i=6; i>=0; i--) {
      const d = new Date(); d.setDate(d.getDate()-i);
      const dS = d.toISOString().split('T')[0];
      chartLabels.push(new Date(dS + 'T12:00:00').toLocaleDateString('es-MX',{weekday:'short'}));
      const pInc = payments.filter(p=>p.date===dS).reduce((s,p)=>s+(Number(p.amount)||0),0);
      const sInc = sales.filter(s=>s.date===dS).reduce((s,sale)=>s+(Number(sale.amount)||0),0);
      chartData.push(pInc + sInc);
    }
  } else {
    const currentYear = new Date().getFullYear();
    const currentMonth = new Date().getMonth();
    for(let i=5; i>=0; i--) {
      const d = new Date(currentYear, currentMonth - i, 1);
      const monthS = d.toISOString().slice(0,7); 
      chartLabels.push(d.toLocaleDateString('es-MX',{month:'short'}));
      const pInc = payments.filter(p=>p.date && p.date.startsWith(monthS)).reduce((s,p)=>s+(Number(p.amount)||0),0);
      const sInc = sales.filter(s=>s.date && s.date.startsWith(monthS)).reduce((s,sale)=>s+(Number(sale.amount)||0),0);
      chartData.push(pInc + sInc);
    }
  }

  const maxW = Math.max(...chartData, 1);

  // --- LÓGICA DEL RADAR DE COBROS (HOY Y MAÑANA) ---
  const gymName = window.elementSdk ? window.elementSdk.config.gym_name : 'el gimnasio';
  
  const radarClients = clients.filter(c => {
      if(!c.expiry || c.status !== 'active') return false;
      const exp = new Date(c.expiry + 'T12:00:00');
      const diffDays = Math.ceil((exp - todayDate) / (1000 * 60 * 60 * 24));
      // Filtramos solo los que vencen hoy (0) o mañana (1)
      return diffDays === 0 || diffDays === 1;
  }).sort((a,b) => new Date(a.expiry) - new Date(b.expiry));

  const radarHTML = `
  <div class="bg-gym-surface rounded-xl p-4 border border-gym-border mt-4 slide-in">
    <div class="flex items-center justify-between mb-3 border-b border-gym-border pb-2">
      <h3 class="text-sm font-800 flex items-center gap-2"><i data-lucide="radar" class="w-4 h-4 text-gym-accent"></i> Radar de Cobros</h3>
      <span class="bg-gym-accent/10 text-gym-accent px-2 py-0.5 rounded text-[10px] font-bold uppercase tracking-wider">${radarClients.length} por renovar</span>
    </div>
    
    <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-3 max-h-[260px] overflow-y-auto pr-1">
      ${radarClients.length === 0 ? '<p class="text-xs text-gym-muted col-span-full py-4 text-center">Nadie vence hoy ni mañana. ¡Todo al día!</p>' :
        radarClients.map(c => {
          const exp = new Date(c.expiry + 'T12:00:00');

async function saveUser() {
  const name = document.getElementById('uf-name').value.trim();
  const username = document.getElementById('uf-username').value.trim();
  const password = document.getElementById('uf-password').value.trim();
  const role = document.getElementById('uf-role').value;

  if(!name || !username || !password) { toast('Todos los campos son obligatorios', 'error'); return; }
  if(username.toLowerCase() === 'admin') { toast('El usuario "admin" está reservado', 'error'); return; }

  if(editingUserId) {
    const existing = allRecords.find(r => r.__backendId === editingUserId);
    if(existing) {
      const conflict = allRecords.find(r => r.type === 'user' && r.username === username && r.__backendId !== editingUserId);
      if(conflict) { toast('El nombre de usuario ya está en uso', 'error'); return; }
      const r = await window.dataSdk.update({...existing, name, username, password, role});
      if(r.isOk) { toast('Usuario actualizado'); editingUserId = null; document.getElementById('user-form-area').innerHTML = ''; } 
      else { toast('Error al actualizar', 'error'); }
    }
  } else {
    const exist = allRecords.find(r => r.type === 'user' && r.username === username);
    if(exist) { toast('El nombre de usuario ya existe', 'error'); return; }
    const r = await window.dataSdk.create({
      type: 'user', name, username, password, role,
      status: 'active', phone: '', email: '', membership: '', amount: 0, method: '',
      date: today(), expiry: '', schedule: '', checkin_date: '', notes: '', category: ''
    });
    if(r.isOk) { toast('Usuario registrado con éxito'); document.getElementById('user-form-area').innerHTML = ''; } 
    else { toast('Error al guardar', 'error'); }
  }
}

async function saveClient() {
  const name = document.getElementById('cf-name').value.trim();
  if(!name) { toast('Ingresa el nombre','error'); return; }
  
  const membership = document.getElementById('cf-membership').value;
  const inscriptionDateStr = document.getElementById('cf-date').value || today();
  const insDate = new Date(inscriptionDateStr + 'T12:00:00');
  
  const expiry = new Date(insDate);
  if(membership === 'Mensual') { expiry.setMonth(expiry.getMonth() + 1); } 
  else if(membership === 'Semanal') { expiry.setDate(expiry.getDate() + 7); } 
  else if(membership === 'Diario') { expiry.setDate(expiry.getDate() + 1); }

  const amountToCharge = parseFloat(document.getElementById('cf-amount').value) || 0;
  const amountReceivedInput = document.getElementById('cf-received').value;
  const amountReceived = amountReceivedInput === "" ? amountToCharge : parseFloat(amountReceivedInput);

  if (amountToCharge > 0 && amountReceived < amountToCharge) {
      toast('El monto recibido es insuficiente', 'error');
      return;
  }

  const expiryStr = expiry.toISOString().split('T')[0];
  
  // GENERAR CÓDIGO DE BARRAS (10 Dígitos aleatorios)
  const barcode = Math.floor(1000000000 + Math.random() * 9000000000).toString();

  const clientData = {
    type:'client', name, phone:document.getElementById('cf-phone').value.trim(), email:document.getElementById('cf-email').value.trim(), 
    membership, status:'active', date: inscriptionDateStr, expiry: expiryStr, barcode: barcode,
    amount:0, method:'', role:'', schedule:'', checkin_date:'', notes:'', category:''
  };

  if(amountToCharge > 0) currentSection = 'ticket'; 

  const r = await window.dataSdk.create(clientData);
  
  if(r.isOk) { 
    clientData.__backendId = r.id; // Asignamos el ID
    toast('Cliente registrado con éxito'); 
    
    if(amountToCharge > 0) {
       const payMethod = document.getElementById('cf-method').value;
       const change = amountReceived - amountToCharge;

       const paymentRecord = {
          type:'payment', name: name, amount: amountToCharge, method: payMethod, membership: membership,
          date: today(), status:'paid', phone:'',email:'',expiry:'',role:'',schedule:'',checkin_date:'',
          notes: `Inscripción | Recibido: $${amountReceived} | Vence: ${expiryStr}`, category:''
       };

       await window.dataSdk.create(paymentRecord);
    }
    
    // Mostramos la credencial digital sobre todo lo demás
    showDigitalCard(clientData);

  } else { 
    currentSection = 'clients';
    renderCurrentSection();
    toast('Error al guardar el cliente','error'); 
  }
}

function renderPayments() {
  const payments = getRecords('payment');
  const clients = getRecords('client');
  const isAdmin = currentUser && currentUser.role === 'admin';
  
  const todayStr = today();
  const todayDate = new Date();
  todayDate.setHours(0, 0, 0, 0); 

  const todayPayments = payments.filter(p => p.date === todayStr);
  const todayIncome = todayPayments.reduce((s, p) => s + (Number(p.amount) || 0), 0);

  const overdueCount = clients.filter(c => {
    if (!c.expiry) return false;
    const exp = new Date(c.expiry + 'T12:00:00');
    return exp < todayDate;
  }).length;

  const upcomingExpCount = clients.filter(c => {

function generateCalendarDays(clients) {
  const year = calendarDate.getFullYear();
  const month = calendarDate.getMonth();
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const todayStr = today();
  
  let html = '';
  
  for (let i = 0; i < firstDay; i++) {
    html += `<div class="cal-day border-r border-b border-gym-border opacity-20"></div>`;
  }
  
  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = year + '-' + String(month+1).padStart(2,'0') + '-' + String(d).padStart(2,'0');
    const isToday = dateStr === todayStr;
    const isSelected = dateStr === selectedCalDate;
    
    const dues = clients.filter(c => c.expiry === dateStr);
    const hasDues = dues.length > 0;
    
    html += `
    <div onclick="selectDay('` + dateStr + `')" 
         class="cal-day border-r border-b border-gym-border p-1 cursor-pointer hover:bg-gym-surface/80 transition-colors ` + (isToday ? 'cal-today' : '') + ` ` + (isSelected ? 'ring-2 ring-inset ring-gym-accent bg-gym-accent/10' : '') + `">
      
      <div class="flex justify-between items-start">
        <span class="text-[10px] font-700 ` + (isToday ? 'text-gym-accent' : 'text-gym-muted') + `">` + d + `</span>
        ` + (hasDues ? `<div class="w-1.5 h-1.5 rounded-full bg-gym-accent glow shadow-[0_0_8px_rgba(244,63,94,0.6)]"></div>` : '') + `
      </div>

      <div class="mt-1 space-y-1">
        ` + dues.map(c => {
          const isVencido = new Date(c.expiry + 'T12:00:00') < new Date().setHours(0,0,0,0);
          return `<div onclick="event.stopPropagation(); quickPay('` + c.name + `')" 
                       class="text-[9px] px-1 py-0.5 rounded bg-gym-bg border border-gym-border cursor-pointer hover:border-gym-accent truncate flex items-center gap-1">
            <div class="w-1 h-1 rounded-full ` + (isVencido ? 'bg-red-500' : 'bg-emerald-500') + ` shrink-0"></div>
            <span class="truncate">` + c.name.split(' ')[0] + `</span>
          </div>`;
        }).join('') + `
      </div>
    </div>`;
  }
  return html;
}

function selectDay(dateStr) {
  selectedCalDate = (selectedCalDate === dateStr) ? null : dateStr;
  renderCurrentSection();
}

function changeCal(offset) {
    const newDate = new Date(calendarDate.setMonth(calendarDate.getMonth() + offset));
    calendarDate = newDate;
    selectedCalDate = null; 
    renderCurrentSection();
}

window.updateClientPreview = function() {
  const name = document.getElementById('pf-client').value;
  const prev = document.getElementById('client-preview');
  if(!name) { prev.innerHTML=''; return; }
  
  const client = getRecords('client').find(c => c.name === name);
  if(!client) return;

  const expDate = new Date((client.expiry || today()) + 'T12:00:00');
  const now = new Date();
  now.setHours(0,0,0,0);
  const diffDays = Math.ceil((expDate - now) / (1000 * 60 * 60 * 24));
  
  let statusText = 'Activo';
  let colorClass = 'text-emerald-400';
  let bgClass = 'bg-emerald-500/10 border-emerald-500/20';
  let dotClass = 'bg-emerald-500';

  if(diffDays < 0) {
      statusText = 'Adeuda';
      colorClass = 'text-red-400';
      bgClass = 'bg-red-500/10 border-red-500/20';
      dotClass = 'bg-red-500';
  } else if (diffDays <= 7) {
      statusText = 'Por vencer';
      colorClass = 'text-amber-400';
      bgClass = 'bg-amber-500/10 border-amber-500/20';
      dotClass = 'bg-amber-500';
  }

  prev.innerHTML = `<div class="p-3 rounded-lg border ${bgClass} text-[10px]">
    <div class="flex items-center gap-2 mb-1">
      <div class="w-2 h-2 rounded-full ${dotClass}"></div>
      <p class="font-700 ${colorClass} uppercase">${statusText}</p>
    </div>
    <p class="text-gym-text">Su membresía ${diffDays < 0 ? 'venció' : 'vence'} el: <strong>${formatDate(client.expiry)}</strong></p>
    <p class="text-gym-muted mt-1">El nuevo mes se sumará ${diffDays >= 0 ? 'a partir de su vencimiento' : 'a partir de hoy'}.</p>
  </div>`;
};

async function savePayment() {
  const name = document.getElementById('pf-client').value;
  const amountStr = document.getElementById('pf-amount').value;
  const amount = parseFloat(amountStr) || 0;
  
  if(!name){toast('Selecciona un cliente','error');return;}
  
  const membership = document.getElementById('pf-membership').value;
  const client = allRecords.find(r=>r.type==='client'&&r.name===name);
  
  let baseDate = new Date();
  if(client && client.expiry) {
      const currentExp = new Date(client.expiry + 'T12:00:00');
      if(currentExp > baseDate) baseDate = currentExp;
  }
  
  if(membership==='Mensual') baseDate.setMonth(baseDate.getMonth()+1);
  else if(membership==='Semanal') baseDate.setDate(baseDate.getDate()+7);
  else baseDate.setDate(baseDate.getDate()+1);
  
  const newExpiry = baseDate.toISOString().split('T')[0];
  currentSection = 'ticket'; 
  
  await window.dataSdk.update({...client, expiry: newExpiry, status:'active'});
  
  const paymentRecord = {
    type:'payment', name, amount, method:document.getElementById('pf-method').value, membership, 
    date:today(), status:'paid', phone:'',email:'',expiry:'',role:'',schedule:'',checkin_date:'',
    notes: `Renovación | Próximo Vencimiento: ${newExpiry}`, category:''
  };

  const r = await window.dataSdk.create(paymentRecord);
  if(r.isOk) { 
    paymentRecord.__backendId = r.id;
    showPaymentTicket(paymentRecord, newExpiry, amount); 
  } else { 
    currentSection = 'payments';
    renderCurrentSection();
    toast('Error al procesar pago','error'); 
  }
}

function reprintPaymentTicket(backendId) {
  const p = allRecords.find(r => r.__backendId === backendId);
  if(!p) return;
  
  // Buscamos la fecha en las notas usando regex más robusto
  let exp = p.date;
  const matchVence = p.notes?.match(/(?:Vence|Vencimiento):\s*([\d-]{10})/);
  
  if (matchVence && matchVence[1]) {
      exp = matchVence[1];
  } else {
      // Si no está en la nota, buscamos la fecha actual del cliente
      const client = allRecords.find(c => c.type === 'client' && c.name === p.name);
      if(client) exp = client.expiry;
  }
  
  // Extraemos monto recibido
  let received = p.amount;
  const matchRec = p.notes?.match(/Recibido:\s*\$?([\d,.]+)/);
  if(matchRec) received = parseFloat(matchRec[1].replace(/,/g, ''));
  
  showPaymentTicket(p, exp, received);
}

// Revertir pago accidental (Solo Admin)
async function deletePaymentRecord(backendId) {
  const payment = allRecords.find(r => r.__backendId === backendId);
  if(!payment) return;

  const btn = window.event.currentTarget || window.event.srcElement;
  if(!btn.dataset.confirming) {
    btn.dataset.confirming = 'true';
    btn.innerHTML = '<span class="text-red-500 font-800">¿Anular?</span>';
    setTimeout(() => { 
      if(btn.dataset.confirming) { 
        delete btn.dataset.confirming; 
        btn.innerHTML = '<i data-lucide="trash-2" class="w-3.5 h-3.5"></i>'; 
        if(window.lucide) lucide.createIcons();
      }
    }, 3000);
    return;
  }
  delete btn.dataset.confirming;

  // 1. Revertir los días de vigencia del cliente
  const client = allRecords.find(r => r.type === 'client' && r.name === payment.name);
  if(client && client.expiry) {
    const expDate = new Date(client.expiry + 'T12:00:00');
    
    // Restamos el tiempo
    if(payment.membership === 'Mensual') {
        expDate.setMonth(expDate.getMonth() - 1);
    } else if(payment.membership === 'Semanal') {
        expDate.setDate(expDate.getDate() - 7);
    } else if(payment.membership === 'Diario') {
        expDate.setDate(expDate.getDate() - 1);
    }
    
    const newExpiryStr = expDate.toISOString().split('T')[0];
    const todayStr = today();
    
    // Determinamos el estatus base
    const isNowActive = newExpiryStr >= todayStr;
    
    await window.dataSdk.update({
        ...client, 
        expiry: newExpiryStr,
        status: isNowActive ? 'active' : 'inactive'
    });
  }

  // 2. Eliminar el pago
  const r = await window.dataSdk.delete(payment);
  if(r.isOk) {
      toast('Cobro anulado y vigencia revertida');
  } else {
      toast('Error al anular cobro', 'error');
  }
}

// Lógica de validación de Check-in
async function doCheckin() {
  const inputEl = document.getElementById('checkin-search');
  const inputVal = inputEl.value.trim();
  const alertBox = document.getElementById('checkin-alert');
  
  if(!inputVal) return;

  const client = getRecords('client').find(c => 
      (c.name || '').toLowerCase() === inputVal.toLowerCase() || 
      (c.phone || '') === inputVal ||
      (c.barcode || '') === inputVal
  );

  if(!client) {
    showCheckinAlert(alertBox, 'bg-red-500/10 border-red-500/50', 'text-red-500', 'x-octagon', 'CLIENTE NO ENCONTRADO', `Verifica el nombre o número. Si es nuevo, regístralo primero.`);
    inputEl.value = ''; inputEl.focus();
    return;
  }

  const expDate = new Date((client.expiry || today()) + 'T12:00:00');
  const now = new Date();
  now.setHours(0,0,0,0);
  const diffDays = Math.ceil((expDate - now) / (1000 * 60 * 60 * 24));

  // SEMÁFORO DE ACCESO
  if (diffDays < 0) {
      // ROJO
      showCheckinAlert(alertBox, 'bg-red-500/20 border-red-500 shadow-lg shadow-red-500/20', 'text-red-500', 'alert-octagon', 'ACCESO DENEGADO', `<span class="font-800 text-white">${client.name}</span> tiene un adeudo. Su membresía venció hace ${Math.abs(diffDays)} días.`);
  } else if (diffDays <= 3) {
      // AMARILLO
      showCheckinAlert(alertBox, 'bg-amber-500/20 border-amber-500 shadow-lg shadow-amber-500/20', 'text-amber-500', 'alert-triangle', 'ACCESO PERMITIDO (POR VENCER)', `¡Hola <span class="font-800 text-white">${client.name}</span>! Te quedan <strong>${diffDays} días</strong> de suscripción.`);
      await saveCheckin(client.name);
      
      // ---> ¡NUEVO!: LANZAR ALERTA GIGANTE PARA EL RECEPCIONISTA <---
      showWarningModal(client.name, diffDays);

  } else {
      // VERDE
      showCheckinAlert(alertBox, 'bg-emerald-500/20 border-emerald-500 shadow-lg shadow-emerald-500/20', 'text-emerald-500', 'check-circle-2', 'ACCESO CORRECTO', `¡A entrenar con todo, <span class="font-800 text-white">${client.name}</span>! (Vence en ${diffDays} días)`);
      await saveCheckin(client.name);
  }

  inputEl.value = '';
  inputEl.focus();
}

// Dibuja la alerta gigante
function showCheckinAlert(el, bgClasses, textClass, icon, title, msg) {
  el.className = `mt-4 p-6 rounded-2xl border-2 fade-in flex flex-col items-center justify-center gap-3 ${bgClasses}`;
  el.innerHTML = `
      <i data-lucide="${icon}" class="w-16 h-16 ${textClass} glow"></i>
      <h2 class="text-3xl font-900 ${textClass} tracking-tight">${title}</h2>
      <p class="text-gym-text text-lg">${msg}</p>
  `;
  el.classList.remove('hidden');
  if(window.lucide) lucide.createIcons();
  
  // Ocultar alerta automáticamente después de 4 segundos
  if(window.checkinTimer) clearTimeout(window.checkinTimer);
  window.checkinTimer = setTimeout(() => {
      el.classList.add('hidden');
  }, 4000);
}

// ===== FINANCE =====
function renderFinance() {
  const transactions = [...getRecords('payment'), ...getRecords('sale')];
  const now = new Date();
  const todayTx = transactions.filter(p=>p.date===today());
  const weekTx = transactions.filter(p=>{if(!p.date)return false;const d=new Date(p.date + 'T12:00:00');const diff=(now-d)/(1000*60*60*24);return diff<=7;});
  const monthTx = transactions.filter(p=>p.date&&p.date.startsWith(now.toISOString().slice(0,7)));
  
  const methods = {};
  transactions.forEach(p=>{const m=p.method||'Otro';methods[m]=(methods[m]||0)+(p.amount||0);});
  const memberships = {};
  getRecords('payment').forEach(p=>{const m=p.membership||'Otro';memberships[m]=(memberships[m]||0)+1;});

  return `
  <div class="fade-in space-y-4">
    <h1 class="text-xl font-800">Finanzas y Reportes globales</h1>
    <div class="grid grid-cols-1 sm:grid-cols-3 gap-3">
      ${statCard('calendar','Hoy',formatMoney(todayTx.reduce((s,p)=>s+(p.amount||0),0)),'bg-emerald-500/10','text-emerald-400')}
      ${statCard('calendar','Semana',formatMoney(weekTx.reduce((s,p)=>s+(p.amount||0),0)),'bg-blue-500/10','text-blue-400')}
      ${statCard('calendar','Mes',formatMoney(monthTx.reduce((s,p)=>s+(p.amount||0),0)),'bg-violet-500/10','text-violet-400')}
    </div>
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
      <div class="bg-gym-surface rounded-xl p-4 border border-gym-border">
        <h3 class="text-sm font-600 mb-3">Ingresos por método (Pagos + POS)</h3>
        <div class="space-y-2">
          ${Object.entries(methods).map(([m,v])=>{const pct=Math.round(v/Math.max(Object.values(methods).reduce((a,b)=>a+b,0),1)*100);return`<div><div class="flex justify-between text-xs mb-1"><span>${m}</span><span class="text-gym-muted">${formatMoney(v)} (${pct}%)</span></div><div class="h-2 bg-gym-border rounded-full overflow-hidden"><div class="h-full bg-gym-accent rounded-full" style="width:${pct}%"></div></div></div>`;}).join('')}
          ${Object.keys(methods).length===0?'<p class="text-xs text-gym-muted text-center py-4">Sin datos</p>':''}
        </div>
      </div>
      <div class="bg-gym-surface rounded-xl p-4 border border-gym-border">
        <h3 class="text-sm font-600 mb-3">Membresías más vendidas</h3>
        <div class="space-y-2">
          ${Object.entries(memberships).sort((a,b)=>b[1]-a[1]).map(([m,c])=>`<div class="flex items-center justify-between p-2 bg-gym-bg rounded-lg"><span class="text-xs font-500">${m}</span><span class="text-xs font-700 text-gym-accent">${c}</span></div>`).join('')}
          ${Object.keys(memberships).length===0?'<p class="text-xs text-gym-muted text-center py-4">Sin datos</p>':''}
        </div>
      </div>
    </div>
  </div>`;
}

function addToCart(name, price) {
  const product = getRecords('product').find(p => p.name === name);
  const existing = cartItems.find(i => i.name === name);
  const currentQty = existing ? existing.qty : 0;

  if (product && currentQty >= (product.amount || 0)) { toast('Stock insuficiente', 'error'); return; }
  if(existing) { existing.qty++; } else { cartItems.push({name, price, qty: 1}); }
  renderCurrentSection();
}

function modifyCart(index, delta) {
  if (delta > 0) {
    const item = cartItems[index];
    const product = getRecords('product').find(p => p.name === item.name);
    if (product && item.qty >= (product.amount || 0)) { toast('Stock insuficiente', 'error'); return; }
  }
  cartItems[index].qty += delta;
  if(cartItems[index].qty <= 0) { cartItems.splice(index, 1); }
  renderCurrentSection();
}

function removeFromCart(index) { cartItems.splice(index, 1); renderCurrentSection(); }
function clearCart() { cartItems = []; renderCurrentSection(); }

function proceedPayment() {
  if(cartItems.length === 0) { toast('Carrito vacío','error'); return; }
  const total = cartItems.reduce((s,i)=>s+(i.price*i.qty),0);
  const area = document.getElementById('content');
  area.innerHTML = `
  <div class="fade-in max-w-md mx-auto">
    <h2 class="text-xl font-800 mb-4">Método de Pago</h2>
    <div class="bg-gym-surface rounded-xl p-4 border border-gym-border space-y-3">
      <div>
        <label for="pay-method" class="text-[10px] text-gym-muted">Método de pago</label>
        <select id="pay-method" class="w-full px-3 py-2.5 rounded-lg text-xs mt-1">
          <option>Efectivo</option>
          <option>Tarjeta</option>
          <option>Transferencia</option>
        </select>
      </div>
      <div>
        <label for="pay-amount" class="text-[10px] text-gym-muted">Monto recibido ($)</label>
        <input id="pay-amount" type="number" class="w-full px-3 py-2.5 rounded-lg text-xs mt-1" placeholder="Ej: ${total}" step="1">
      </div>
      <div class="bg-gym-bg rounded-lg p-3 text-center">
        <p class="text-[10px] text-gym-muted">Total a pagar</p>
        <p class="text-2xl font-800 text-gym-accent">${formatMoney(total)}</p>
      </div>
      <div id="change-info"></div>
      <div class="flex gap-2">
        <button onclick="navigateTo('pos')" class="flex-1 px-4 py-2.5 bg-gym-border text-gym-muted rounded-lg text-xs font-600 transition-colors hover:bg-gym-border/80">Cancelar</button>
        <button onclick="finalizeSale(${total})" class="flex-1 px-4 py-2.5 bg-gym-accent hover:bg-gym-accentHover text-white rounded-lg text-xs font-600 transition-colors">Completar Venta</button>
      </div>
    </div>
  </div>`;
  
  document.getElementById('pay-amount').addEventListener('input', (e) => {
    const amount = parseFloat(e.target.value) || 0;
    const change = amount - total;
    const info = document.getElementById('change-info');
    
    if(e.target.value === "") { info.innerHTML = ``; } 
    else if(change >= 0) { info.innerHTML = `<div class="bg-emerald-500/10 border border-emerald-500/20 rounded-lg p-2 text-center"><p class="text-[10px] text-emerald-400">Cambio a entregar</p><p class="text-lg font-700 text-emerald-400">${formatMoney(change)}</p></div>`; } 
    else { info.innerHTML = `<div class="bg-red-500/10 border border-red-500/20 rounded-lg p-2 text-center"><p class="text-[10px] text-red-400">Falta dinero</p><p class="text-lg font-700 text-red-400">${formatMoney(Math.abs(change))}</p></div>`; }
  });
  if(window.lucide) lucide.createIcons();
}

async function finalizeSale(total) {
  const method = document.getElementById('pay-method').value;
  const inputEl = document.getElementById('pay-amount').value;
  const received = inputEl === "" ? total : parseFloat(inputEl);
  
  if(received < total) { toast('Monto insuficiente','error'); return; }
  
  const ticketNum = 'TK-' + Date.now().toString().slice(-6);
  const itemsList = cartItems.map(i => `${i.qty}x ${i.name}`).join(' | ');
  
  const sale = {
    type: 'sale',
    ticket_number: ticketNum,
    name: itemsList,
    amount: total,
    method,
    date: today(),
    employee: currentUser.username, 
    status: 'completed',
    items: JSON.stringify(cartItems),
    notes: `Recibido: $${received} | Cambio: $${received - total}`,
    phone: '', email: '', membership: '', expiry: '', role: '', schedule: '', checkin_date: '', category: ''
  };
  
  // BLOQUEAR EL REDIBUJADO DE LA PANTALLA
  currentSection = 'ticket';
  const r = await window.dataSdk.create(sale);

  if(r.isOk) {
    for (const item of cartItems) {
      const product = allRecords.find(p => p.type === 'product' && p.name === item.name);
      if (product) {
        const newStock = Math.max(0, (product.amount || 0) - item.qty);
        await window.dataSdk.update({ ...product, amount: newStock });
      }
    }
    showTicket(sale, received, false); 
  } else {
    currentSection = 'pos';
    renderCurrentSection();
    toast('Error al guardar','error');
  }
}

function expandSale(el) {
  const details = el.parentElement.querySelector('.sale-details');
  if(details) details.classList.toggle('hidden');
}

function viewPastTicket(backendId) {
  const sale = allRecords.find(r => r.__backendId === backendId);
  if(!sale) return;

  let received = sale.amount;
  const match = sale.notes?.match(/Recibido:\s*\$?([\d,.]+)/);
  if(match && match[1]) {
     received = parseFloat(match[1].replace(/,/g, ''));
  }

  showTicket(sale, received, true); 
}

async function deleteSaleRecord(backendId) {
  const sale = allRecords.find(r => r.__backendId === backendId);
  if(!sale) return;
  
  const btn = window.event.currentTarget || window.event.srcElement;
  if(!btn.dataset.confirming) {
    btn.dataset.confirming = 'true';
    btn.innerHTML = '<i data-lucide="alert-triangle" class="w-3.5 h-3.5"></i> ¿Devolver Stock?';
    setTimeout(() => { if(btn.dataset.confirming) { delete btn.dataset.confirming; btn.innerHTML = `<i data-lucide="trash-2" class="w-3.5 h-3.5"></i> Cancelar Venta`; if(window.lucide) lucide.createIcons(); }}, 3000);
    return;
  }
  delete btn.dataset.confirming;

  try {
      const items = JSON.parse(sale.items || '[]');
      for (const item of items) {
          const product = allRecords.find(p => p.type === 'product' && p.name === item.name);
          if (product) {
              const newStock = (product.amount || 0) + item.qty;
              await window.dataSdk.update({ ...product, amount: newStock });
          }
      }
  } catch(e) { console.error(e); }

  const r = await window.dataSdk.delete(sale);
  if(r.isOk) {
      toast('Venta cancelada y stock restaurado');
  } else {
      toast('Error al cancelar la venta','error');
  }
}

window.downloadPDF = function(clientName) {
    const element = document.getElementById('credencial-export');
    const opt = {
        margin:       0,
        filename:     `Credencial_${clientName.replace(/\s+/g, '_')}.pdf`,
        image:        { type: 'jpeg', quality: 1 },
        html2canvas:  { scale: 3, useCORS: true, backgroundColor: '#0a0a0f' },
        jsPDF:        { unit: 'in', format: [3.1, 4.6], orientation: 'portrait' }
    };
    
    html2pdf().set(opt).from(element).save().then(() => {
        toast('¡PDF Descargado exitosamente!');
    });

// ===== DELETE GENÉRICO Y EN CASCADA =====
async function deleteRecord(backendId, type) {
  const record = allRecords.find(r => r.__backendId === backendId);
  if(!record) return;
  
  const btn = window.event.currentTarget || window.event.srcElement;
  if(!btn.dataset.confirming) {
    btn.dataset.confirming = 'true';
    btn.innerHTML = '<span class="text-[10px] text-red-400 font-600">¿Eliminar?</span>';
    setTimeout(() => { 
      if(btn.dataset.confirming) { 
        delete btn.dataset.confirming; 
        btn.innerHTML = `<i data-lucide="trash-2" class="w-3.5 h-3.5 text-gym-muted"></i>`; 
        if(window.lucide) lucide.createIcons(); 
      }
    }, 3000);
    return;
  }
  delete btn.dataset.confirming;

  // --- NUEVA LÓGICA: ELIMINACIÓN EN CASCADA ---
  // Si eliminamos un cliente, borramos también todo su historial
  if (type === 'client') {
    const clientName = record.name;
    
    // 1. Encontrar y borrar todos sus pagos (Limpia el calendario y finanzas)
    const clientPayments = allRecords.filter(r => r.type === 'payment' && r.name === clientName);
    for (const p of clientPayments) {
        await window.dataSdk.delete(p);
    }
    
    // 2. Encontrar y borrar todos sus check-ins
    const clientCheckins = allRecords.filter(r => r.type === 'checkin' && r.name === clientName);
    for (const c of clientCheckins) {
        await window.dataSdk.delete(c);
    }
  }
  // --------------------------------------------

  // Finalmente, eliminamos el registro principal
  const r = await window.dataSdk.delete(record);
  
  if(r.isOk) {
      toast(type === 'client' ? 'Cliente e historial eliminados' : 'Eliminado');
  } else {
      toast('Error al eliminar', 'error');
  }
}
